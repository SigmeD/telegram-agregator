# Gitleaks config — extends the default ruleset with project-specific allowlists.
# Default rules: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
[extend]
useDefault = true

[allowlist]
description = "Project-specific paths whose contents are intentionally placeholder values."
paths = [
    # env-file templates checked into the repo: every value is a documented
    # placeholder, never a real credential. Real .env files are gitignored.
    '''(^|/)\.env\.example$''',
    '''(^|/)[^/]+\.env\.example$''',
    '''^infra/env/.*\.example$''',
]
