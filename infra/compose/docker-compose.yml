# -----------------------------------------------------------------------------
# Base compose stack for Telegram Lead Aggregator backend.
# Layer with:
#   docker-compose.dev.yml   — development overrides
#   docker-compose.prod.yml  — production overrides
#   docker-compose.override.yml (optional, git-ignored) — local tweaks
# -----------------------------------------------------------------------------
# All *_IMAGE / *_TAG vars come from .env next to this file (git-ignored).
# Secrets (POSTGRES_PASSWORD, API keys, tokens) MUST arrive via env_file or
# external secret injection — never commit actual values.
# -----------------------------------------------------------------------------
name: tlg-aggregator

x-backend-common: &backend-common
  image: ${BACKEND_IMAGE:-ghcr.io/sigmed/tlg-aggregator}:${BACKEND_TAG:-latest}
  env_file:
    - ../env/backend.env
  environment:
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tlg}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/${POSTGRES_DB:-tlg}
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
    TLG_SESSION_DIR: /var/lib/tlg/sessions
    LOG_LEVEL: ${LOG_LEVEL:-info}
  depends_on:
    postgres:
      condition: service_healthy
      restart: true
    redis:
      condition: service_healthy
      restart: true
  networks:
    - tlg
  # Sensible default; overrides in per-service restart policy below.
  restart: unless-stopped

services:
  # ---------------------------------------------------------------------------
  # Data plane
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tlg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-tlg}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - tlg
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--maxmemory", "${REDIS_MAXMEMORY:-512mb}",
        "--maxmemory-policy", "allkeys-lru",
      ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - tlg
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # One-shot migrations — MUST finish before listener/worker/api/bot start.
  # Uses pg_advisory_lock via alembic's env.py to avoid parallel migrations.
  # ---------------------------------------------------------------------------
  migrate:
    <<: *backend-common
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------------------------
  # One-shot interactive session bootstrap.
  # Run manually on the VPS:
  #   docker compose -f docker-compose.yml -f docker-compose.dev.yml \
  #     --profile bootstrap run --rm bootstrap
  # Writes Fernet-encrypted .session.enc to /var/lib/tlg/sessions/ on the
  # tlg-session-data volume. Requires TTY for SMS-code / 2FA-password input.
  #
  # **Prerequisite:** infra/env/backend.env must exist on the host. It is
  # generated by deploy.sh on every CD run (transient, git-ignored). On a
  # fresh VPS before the first CD deploy, either run cd-backend-dev
  # (workflow_dispatch with skip_migrations=true) to generate the env file,
  # or provision it manually from infra/env/backend.env.example with real
  # secrets.
  # ---------------------------------------------------------------------------
  bootstrap:
    <<: *backend-common
    profiles: ["bootstrap"]
    command: ["python", "-m", "shared.telegram.bootstrap"]
    tty: true
    stdin_open: true
    restart: "no"
    depends_on: {}  # no service deps; talks directly to Telegram
    volumes:
      - session-data:/var/lib/tlg/sessions
    tmpfs:
      - "/tmp:size=4m,mode=1777"  # symmetric with backend-listener

  # ---------------------------------------------------------------------------
  # Application services — all reuse the same image, differ only by ENTRYPOINT.
  # ---------------------------------------------------------------------------
  backend-listener:
    <<: *backend-common
    command: ["listener"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - session-data:/var/lib/tlg/sessions
    # /tmp as actual tmpfs — wiped on every container start, not just on
    # `docker rm`. Required so the alive-marker at /tmp/tlg-listener.alive
    # can't survive a SIGKILL → docker restart cycle and produce a
    # false-positive HEALTHY before the new listener process re-touches it.
    # 4 MB cap (marker is <100 bytes); mode 1777 = standard /tmp perms.
    tmpfs:
      - "/tmp:size=4m,mode=1777"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from shared.telegram.session_manager import session_alive; import sys; sys.exit(0 if session_alive() else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend-worker:
    <<: *backend-common
    command: ["worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend-api:
    <<: *backend-common
    command: ["api"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Host port binding lives in env-overrides ONLY (dev: 127.0.0.1:8000;
    # prod: none, behind nginx). Compose merges `ports:` lists additively,
    # so a base mapping + an override mapping would BOTH be bound — kernel
    # rejects the second one as "address already in use" because the
    # broader 0.0.0.0 mapping already covers 127.0.0.1. Inter-container
    # access stays on the `tlg` network via DNS name `backend-api:8000`.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend-bot:
    <<: *backend-common
    command: ["bot"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      backend-api:
        condition: service_healthy

networks:
  tlg:
    driver: bridge

volumes:
  pg-data:
    name: tlg-pg-data
  redis-data:
    name: tlg-redis-data
  session-data:
    name: tlg-session-data
