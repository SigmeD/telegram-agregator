# -----------------------------------------------------------------------------
# Production override — applied on the prod VPS.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# -----------------------------------------------------------------------------
name: tlg-aggregator

x-prod-image: &prod-image
  image: ghcr.io/erohin-m/tlg-aggregator:${BACKEND_TAG:?BACKEND_TAG required in prod}

x-prod-restart: &prod-restart
  restart: always

x-prod-logging: &prod-logging
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

services:
  postgres:
    <<: [*prod-restart, *prod-logging]
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1500M
        reservations:
          memory: 512M
    # No exposed ports in prod — only reachable over the tlg network.
    ports: []

  redis:
    <<: [*prod-restart, *prod-logging]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
    ports: []

  migrate:
    <<: [*prod-image, *prod-logging]

  backend-listener:
    <<: [*prod-image, *prod-restart, *prod-logging]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    environment:
      ENV: prod
      LOG_LEVEL: ${LOG_LEVEL:-info}

  backend-worker:
    <<: [*prod-image, *prod-restart, *prod-logging]
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
    environment:
      ENV: prod
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}

  backend-api:
    <<: [*prod-image, *prod-restart, *prod-logging]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    environment:
      ENV: prod
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_WORKERS: ${API_WORKERS:-2}
    # API is exposed to nginx only, not publicly.
    ports: []
    expose:
      - "8000"

  backend-bot:
    <<: [*prod-image, *prod-restart, *prod-logging]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    environment:
      ENV: prod
      LOG_LEVEL: ${LOG_LEVEL:-info}

  # ---------------------------------------------------------------------------
  # TLS-terminating reverse proxy in front of FastAPI.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/api.conf:/etc/nginx/conf.d/api.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - tlg
    <<: [*prod-restart, *prod-logging]

volumes:
  certbot-webroot:
    name: tlg-certbot-webroot
