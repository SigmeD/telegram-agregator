# -----------------------------------------------------------------------------
# Reverse proxy in front of FastAPI (backend-api) on :8000.
# TLS stub: replace with certbot-issued certs. ACME http-01 lives at
# /.well-known/acme-challenge/ on port 80.
# -----------------------------------------------------------------------------

# Forward real client IP / proto so FastAPI with --proxy-headers is happy.
map $http_x_forwarded_proto $proxy_scheme {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

upstream tlg_api {
    server backend-api:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# --- :80 ------ ACME challenge + permanent redirect to HTTPS ----------------
server {
    listen 80;
    listen [::]:80;
    server_name ${API_DOMAIN:-_};

    # Local healthcheck for the proxy container itself.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # certbot --webroot target
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- :443 ----- main TLS server --------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name ${API_DOMAIN:-_};

    # Replace with real certs issued by certbot (mounted from /etc/letsencrypt).
    ssl_certificate     /etc/letsencrypt/live/${API_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${API_DOMAIN}/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers baseline.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Keep request body limits tight — this API is JSON, not uploads.
    client_max_body_size 2m;

    # Health (unauthenticated, cheap).
    location = /health {
        proxy_pass http://tlg_api/health;
        access_log off;
    }

    # Admin / API surface.
    location / {
        proxy_pass http://tlg_api;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
    }

    # Prometheus scrape endpoint — lock down via allow/deny in prod.
    location = /metrics {
        # allow 10.0.0.0/8;
        # deny  all;
        proxy_pass http://tlg_api/metrics;
    }
}
