[alembic]
# Alembic config for the tlg-lead-aggregator backend.
# `sqlalchemy.url` is injected at runtime from `shared.config.Settings.DATABASE_URL`
# (see migrations/env.py), so the placeholder here is intentionally empty.

script_location = %(here)s
prepend_sys_path = ../src
version_locations = %(here)s/versions
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
timezone = UTC
truncate_slug_length = 40
output_encoding = utf-8
sqlalchemy.url =

[post_write_hooks]
hooks = ruff-format, ruff
ruff-format.type = console_scripts
ruff-format.entrypoint = ruff
ruff-format.options = format REVISION_SCRIPT_FILENAME
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
