# Стартовый словарь keyword-триггеров (TZ FEATURE-04).
# Поля:
#   keyword       — подстрока для поиска (regex-экранирование делает фильтр).
#   trigger_type  — direct_request | pain_signal | lifecycle_event | negative
#   weight        — 1..10 (negative игнорирует weight).
#   language      — ISO-639-1, по умолчанию "ru".
#   is_active     — флаг включения.
# Логика: sum(weight of positive matches) >= 5 AND no negative match -> to LLM.
# ---------------------------------------------------------------------------

triggers:
  # --- Прямые запросы (weight 10) ----------------------------------------
  - keyword: "ищу разработчика"
    trigger_type: direct_request
    weight: 10
    language: ru
    is_active: true
  - keyword: "ищу разработчиков"
    trigger_type: direct_request
    weight: 10
    language: ru
    is_active: true
  - keyword: "нужна команда"
    trigger_type: direct_request
    weight: 10
    language: ru
    is_active: true
  - keyword: "нужен MVP"
    trigger_type: direct_request
    weight: 10
    language: ru
    is_active: true
  - keyword: "нужен техлид"
    trigger_type: direct_request
    weight: 10
    language: ru
    is_active: true
  - keyword: "нужен CTO"
    trigger_type: direct_request
    weight: 10
    language: ru
    is_active: true
  - keyword: "ищу подрядчика"
    trigger_type: direct_request
    weight: 10
    language: ru
    is_active: true
  - keyword: "ищем студию"
    trigger_type: direct_request
    weight: 10
    language: ru
    is_active: true
  - keyword: "порекомендуйте команду"
    trigger_type: direct_request
    weight: 10
    language: ru
    is_active: true
  - keyword: "looking for developers"
    trigger_type: direct_request
    weight: 10
    language: en
    is_active: true
  - keyword: "need CTO"
    trigger_type: direct_request
    weight: 10
    language: en
    is_active: true

