name: cd-backend-dev

on:
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - "pyproject.toml"
      - "infra/docker/backend.Dockerfile"
      - "infra/compose/**"
      - "infra/scripts/deploy.sh"
      - ".github/workflows/cd-backend-dev.yml"
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: "Skip alembic upgrade head"
        required: false
        default: "false"

concurrency:
  group: cd-backend-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sigmed/tlg-aggregator

jobs:
  build-and-push:
    name: build & push image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.primary_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          PRIMARY_TAG="sha-${SHORT_SHA}"
          {
            echo "primary_tag=${PRIMARY_TAG}"
            echo "tags<<EOF"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${PRIMARY_TAG}"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/backend.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

  deploy:
    name: deploy → DEV VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: dev
      url: https://${{ vars.DEV_API_DOMAIN || 'dev-api.example.com' }}/health
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_VPS_HOST }}
          username: ${{ secrets.DEV_VPS_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_SSH_PORT || 22 }}
          envs: IMAGE_TAG,SKIP_MIGRATIONS,POSTGRES_PASSWORD,ANTHROPIC_API_KEY,OPENAI_API_KEY,TELEGRAM_API_ID,TELEGRAM_API_HASH,NOTIFY_BOT_TOKEN,JWT_SECRET,TELETHON_SESSION_KEY,SENTRY_DSN
          script_stop: true
          script: |
            set -eu  # appleboy/ssh-action runs script via VPS /bin/sh (dash); -Eeuo pipefail is bash-only
            cd /opt/tlg
            git fetch --depth 1 origin develop
            git checkout -f origin/develop
            export POSTGRES_PASSWORD ANTHROPIC_API_KEY OPENAI_API_KEY TELEGRAM_API_ID \
                   TELEGRAM_API_HASH NOTIFY_BOT_TOKEN JWT_SECRET TELETHON_SESSION_KEY SENTRY_DSN
            if [ "${SKIP_MIGRATIONS}" = "true" ]; then
              bash infra/scripts/deploy.sh dev "${IMAGE_TAG}" --skip-migrations
            else
              bash infra/scripts/deploy.sh dev "${IMAGE_TAG}"
            fi
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          SKIP_MIGRATIONS: ${{ inputs.skip_migrations || 'false' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          NOTIFY_BOT_TOKEN: ${{ secrets.NOTIFY_BOT_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TELETHON_SESSION_KEY: ${{ secrets.TELETHON_SESSION_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
